<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias — Impulso Crea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1330;
    --white:#F5F7FA;
    --signal:#F5A623;
    --cta:#3DA35D;
    --cta-hover:#4CBE6D;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink);
    color:var(--white);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
  }
  .box{max-width:480px;}
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:clamp(1.6rem,4vw,2.2rem);
    margin-bottom:16px;
  }
  h1 em{font-style:normal; color:var(--signal);}
  p{color:#C7CED6; margin-bottom:28px; line-height:1.6;}
  a.btn{
    display:inline-block;
    background:var(--cta);
    color:var(--white);
    font-weight:600;
    padding:14px 26px;
    border-radius:2px;
    text-decoration:none;
  }
  a.btn:hover{background:var(--cta-hover);}
</style>
</head>
<body>
  <div class="box">
    <h1>¡Recibimos tu <em>solicitud</em>!</h1>
    <p>Gracias por escribirnos. Vamos a revisar tu información y te contactaremos pronto para agendar tu auditoría gratuita.</p>
    <a class="btn" href="index.html">Volver al sitio</a>
  </div>
</body>
</html>
